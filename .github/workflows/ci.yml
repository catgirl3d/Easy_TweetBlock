name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
      - "*.*.*"
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm test

  build:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release tag against manifest version
        run: npm run validate:release-tag -- "${{ github.ref_name }}"

      - name: Build release packages
        run: npm run package

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: easy-tweetblock-packages-${{ github.ref_name }}
          path: dist
          if-no-files-found: error

  lint:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: easy-tweetblock-packages-${{ github.ref_name }}
          path: dist

      - name: Run Firefox extension lint
        run: npm run lint

  publish_release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: lint
    runs-on: ubuntu-latest
    concurrency:
      group: publish-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.ref_name }}

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: easy-tweetblock-packages-${{ github.ref_name }}
          path: dist

      - name: Prepare release notes from changelog
        run: node scripts/extract-release-notes.js "${{ github.ref_name }}" dist/release-notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.xpi
            dist/*.zip
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
